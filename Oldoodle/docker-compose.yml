services:
  oldoodle-full:
    build: .
    image: oldoodle-full:local
    container_name: oldoodle-full
    restart: unless-stopped
    environment:
      NODE_ENV: production
      OLDOOGLE_NO_OPEN: "1"
      PORT: "8080"
      SEARCH_PROVIDER: duckduckgo
      SEARCH_TIMEOUT_MS: "5000"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

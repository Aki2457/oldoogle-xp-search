name: Build Docker Image

on:
  push:
    branches:
      - main
    paths:
      - Oldoodle/Dockerfile
      - Oldoodle/Dockerfile.web
      - Oldoodle/Dockerfile.search-api
      - Oldoodle/Dockerfile.full
      - Oldoodle/.dockerignore
      - Oldoodle/docker-compose.yml
      - Oldoodle/package.json
      - Oldoodle/package-lock.json
      - Oldoodle/server.js
      - Oldoodle/public/**
      - .github/workflows/docker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: oldoodle-web
            dockerfile: Dockerfile.web
            tag: web
          - name: oldoodle-search-api
            dockerfile: Dockerfile.search-api
            tag: search-api
          - name: oldoodle-full
            dockerfile: Dockerfile.full
            tag: full
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: Oldoodle
          file: Oldoodle/${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/aki2457/${{ matrix.image.name }}:latest
            ghcr.io/aki2457/${{ matrix.image.name }}:${{ github.sha }}
            ghcr.io/aki2457/oldoodle:${{ matrix.image.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Conservative optimizations that do not intentionally change gameplay.
chunks:
  auto-save-interval: default
collisions:
  max-entity-collisions: 8
entities:
  spawning:
    despawn-ranges:
      ambient:
        hard: 32
        soft: 16
      monster:
        hard: 128
        soft: 32
hopper:
  cooldown-when-full: true
  disable-move-event: false
